<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Viewer Example</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, sans-serif;
      background: #1a1a1a;
      color: #eee;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #sidebar {
      width: 240px;
      flex-shrink: 0;
      background: #242424;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      border-right: 1px solid #333;
    }

    #sidebar h2 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 4px;
    }

    .section { display: flex; flex-direction: column; gap: 8px; }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #666;
      border-bottom: 1px solid #333;
      padding-bottom: 4px;
    }

    button {
      background: #333;
      border: 1px solid #444;
      color: #eee;
      padding: 7px 10px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      text-align: left;
      transition: background 0.15s;
    }
    button:hover { background: #3d3d3d; }
    button.active { background: #2a5a2a; border-color: #4a8a4a; }

    label { font-size: 12px; color: #aaa; display: flex; flex-direction: column; gap: 4px; }
    input[type=range] { width: 100%; }
    input[type=color] { width: 100%; height: 28px; border: none; border-radius: 4px; cursor: pointer; }

    #info-panel {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 5px;
      padding: 10px;
      font-size: 11px;
      color: #aaa;
      min-height: 60px;
      line-height: 1.6;
    }

    #canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #hud {
      position: absolute;
      bottom: 12px;
      left: 12px;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      pointer-events: none;
      line-height: 1.8;
    }
  </style>
</head>
<body>

<div id="sidebar">
  <h2>Viewer Example</h2>

  <div class="section">
    <div class="section-title">Add Geometry</div>
    <button onclick="addBox()">Add Box</button>
    <button onclick="addSphere()">Add Sphere</button>
    <button onclick="addTorus()">Add Torus</button>
    <button onclick="addRandomMeshes()">Add Random Scene</button>
    <button onclick="clearMeshes()">Clear Scene</button>
  </div>

  <div class="section">
    <div class="section-title">Camera</div>
    <button onclick="fitToView()">Fit to View (F)</button>
    <button id="btn-autorotate" onclick="toggleAutoRotate()">Auto Rotate: Off</button>
  </div>

  <div class="section">
    <div class="section-title">Floor</div>
    <button id="btn-floor" onclick="toggleFloor()">Floor: Off</button>
  </div>

  <div class="section">
    <div class="section-title">Selection Color</div>
    <label>
      Pick color
      <input type="color" id="sel-color" value="#ff0000" oninput="updateSelectionColor(this.value)" />
    </label>
  </div>

  <div class="section">
    <div class="section-title">Selected Object</div>
    <div id="info-panel">Click a mesh to select it.<br>Double-click to zoom in.</div>
  </div>
</div>

<div id="canvas-container">
  <canvas id="viewer-canvas"></canvas>
  <div id="hud">
    F / Space — fit to view &nbsp;|&nbsp; Esc — deselect &nbsp;|&nbsp; Double-click — zoom to mesh
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.171.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Smooth camera animation helper ──────────────────────────────────────────

function animateCameraTo(camera, controls, toPosition, toTarget, durationMs = 600) {
  const fromPosition = camera.position.clone();
  const fromTarget = controls.target.clone();
  const startTime = performance.now();
  const easeOut = (t) => 1 - Math.pow(1 - t, 3);

  const tick = () => {
    const t = easeOut(Math.min((performance.now() - startTime) / durationMs, 1));
    camera.position.lerpVectors(fromPosition, toPosition, t);
    controls.target.lerpVectors(fromTarget, toTarget, t);
    controls.update();
    if (t < 1) requestAnimationFrame(tick);
  };

  requestAnimationFrame(tick);
}

// ─── Minimal inline version of initThree (mirrors three-initializer.ts) ───────

function initThree(canvas, options = {}) {
  const parent = canvas.parentElement;
  const getSize = () => parent
    ? { width: parent.clientWidth, height: parent.clientHeight }
    : { width: window.innerWidth, height: window.innerHeight };

  const { width, height } = getSize();

  // Scene
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xf0f0f0);
  scene.up.set(0, 0, 1);

  // Camera
  const camera = new THREE.PerspectiveCamera(20, width / height, 0.01, 2000);
  camera.position.set(-10, 10, 10);

  // Renderer
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, logarithmicDepthBuffer: true });
  canvas.style.width = '100%';
  canvas.style.height = '100%';
  canvas.style.display = 'block';
  renderer.setSize(width, height, true);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.VSMShadowMap;
  renderer.toneMapping = THREE.NeutralToneMapping;
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  // Lighting
  const ambient = new THREE.AmbientLight(0x404040, 1);
  scene.add(ambient);
  const sun = new THREE.DirectionalLight(0xffffff, 1);
  sun.position.set(25, 50, 25);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.left = -100; sun.shadow.camera.right = 100;
  sun.shadow.camera.top = 100; sun.shadow.camera.bottom = -100;
  sun.shadow.bias = -0.0001;
  scene.add(sun);

  // Controls
  const controls = new OrbitControls(camera, canvas);
  controls.screenSpacePanning = false;
  controls.maxPolarAngle = Math.PI;
  controls.update();

  // Floor (hidden by default)
  const floorGeo = new THREE.PlaneGeometry(50, 50);
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x808080, roughness: 0.7, side: THREE.DoubleSide });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.userData.id = 'floor';
  floor.name = 'floor';
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  floor.visible = false;
  scene.add(floor);

  // Selection state
  const selectedObjects = new Set();
  const originalMaterials = new Map();
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  const mouseDownPos = new THREE.Vector2();
  let selectionColor = new THREE.Color('#ff0000');

  const clearSelection = () => {
    selectedObjects.forEach(obj => {
      if (obj instanceof THREE.Mesh && originalMaterials.has(obj)) {
        obj.material = originalMaterials.get(obj);
        originalMaterials.delete(obj);
      }
    });
    selectedObjects.clear();
  };

  const fitToView = () => {
    const box = new THREE.Box3();
    scene.traverse(obj => {
      if (obj.visible && obj.userData.id !== 'floor' && obj instanceof THREE.Mesh)
        box.expandByObject(obj);
    });
    if (box.isEmpty()) return;
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const fov = camera.fov * (Math.PI / 180);
    const distance = (maxDim / (2 * Math.tan(fov / 2))) * 1.5;
    const dir = camera.position.clone().sub(controls.target).normalize();
    camera.position.copy(center.clone().add(dir.multiplyScalar(distance)));
    controls.target.copy(center);
    controls.update();
  };

  // Click
  canvas.addEventListener('mousedown', e => mouseDownPos.set(e.clientX, e.clientY));
  canvas.addEventListener('click', e => {
    if (mouseDownPos.distanceTo(new THREE.Vector2(e.clientX, e.clientY)) > 5) return;
    const rect = canvas.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(scene.children, true);
    if (hits.length > 0) {
      const obj = hits[0].object;
      if (!selectedObjects.has(obj)) {
        clearSelection();
        selectedObjects.add(obj);
        if (obj instanceof THREE.Mesh && obj.material instanceof THREE.Material) {
          originalMaterials.set(obj, obj.material);
          const m = obj.material.clone();
          m.emissive = selectionColor.clone();
          obj.material = m;
        }
        options.onObjectSelected?.(obj);
      }
    } else {
      clearSelection();
      options.onBackgroundClicked?.();
    }
  });

  // Double-click zoom (smooth)
  canvas.addEventListener('dblclick', e => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(scene.children, true);
    if (hits.length === 0) return;
    const obj = hits[0].object;
    options.onMeshDoubleClicked?.(obj);
    const box = new THREE.Box3().setFromObject(obj);
    if (box.isEmpty()) return;
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const fov = camera.fov * (Math.PI / 180);
    const distance = (maxDim / (2 * Math.tan(fov / 2))) * 1.5;
    const dir = camera.position.clone().sub(controls.target).normalize();
    const toPosition = center.clone().add(dir.multiplyScalar(distance));
    animateCameraTo(camera, controls, toPosition, center);
  });

  // Keyboard
  canvas.setAttribute('tabindex', '0');
  canvas.addEventListener('keydown', e => {
    if (e.key.toLowerCase() === 'f' || e.key === ' ') { e.preventDefault(); fitToView(); }
    if (e.key === 'Escape') { e.preventDefault(); clearSelection(); options.onBackgroundClicked?.(); }
  });

  // Resize
  let resizeTimeout;
  const resizeObserver = new ResizeObserver(() => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => {
      const { width, height } = getSize();
      if (!width || !height) return;
      const pr = Math.min(window.devicePixelRatio, 2);
      renderer.setPixelRatio(pr);
      renderer.setSize(width, height, true);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
    }, 100);
  });
  resizeObserver.observe(parent || document.body);

  // Animation loop
  let animId;
  const animate = () => {
    animId = requestAnimationFrame(animate);
    if (controls.autoRotate) controls.update();
    renderer.render(scene, camera);
  };
  animate();

  const dispose = () => {
    cancelAnimationFrame(animId);
    resizeObserver.disconnect();
    controls.dispose();
    renderer.dispose();
  };

  return {
    scene, camera, controls, renderer, floor, sun,
    fitToView, clearSelection, dispose,
    setSelectionColor: (c) => { selectionColor = new THREE.Color(c); }
  };
}

// ─── App ─────────────────────────────────────────────────────────────────────

const canvas = document.getElementById('viewer-canvas');
const infoPanel = document.getElementById('info-panel');
let floorVisible = false;
let autoRotate = false;

const viewer = initThree(canvas, {
  onObjectSelected: (obj) => {
    infoPanel.innerHTML = `
      <b>${obj.name || 'Mesh'}</b><br>
      Type: ${obj.type}<br>
      Position: ${obj.position.toArray().map(v => v.toFixed(2)).join(', ')}<br>
      ${Object.keys(obj.userData).length ? 'UserData: ' + JSON.stringify(obj.userData) : ''}
    `;
  },
  onBackgroundClicked: () => {
    infoPanel.textContent = 'Click a mesh to select it.\nDouble-click to zoom in.';
  },
  onMeshDoubleClicked: (obj) => {
    infoPanel.innerHTML = `<b>Zoomed into:</b> ${obj.name || 'Mesh'}`;
  }
});

// ─── Geometry helpers ─────────────────────────────────────────────────────────

let meshCount = 0;

function makeMaterial(color) {
  return new THREE.MeshStandardMaterial({ color, roughness: 0.5, metalness: 0.1 });
}

function addMesh(geo, name, color, position) {
  const mesh = new THREE.Mesh(geo, makeMaterial(color));
  mesh.name = name;
  mesh.position.copy(position);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  viewer.scene.add(mesh);
  meshCount++;
}

window.addBox = () => {
  addMesh(
    new THREE.BoxGeometry(1, 1, 1),
    `Box_${meshCount}`,
    new THREE.Color().setHSL(Math.random(), 0.6, 0.5),
    new THREE.Vector3((Math.random() - 0.5) * 6, 0.5, (Math.random() - 0.5) * 6)
  );
};

window.addSphere = () => {
  addMesh(
    new THREE.SphereGeometry(0.6, 32, 32),
    `Sphere_${meshCount}`,
    new THREE.Color().setHSL(Math.random(), 0.6, 0.5),
    new THREE.Vector3((Math.random() - 0.5) * 6, 0.6, (Math.random() - 0.5) * 6)
  );
};

window.addTorus = () => {
  addMesh(
    new THREE.TorusGeometry(0.6, 0.25, 16, 64),
    `Torus_${meshCount}`,
    new THREE.Color().setHSL(Math.random(), 0.6, 0.5),
    new THREE.Vector3((Math.random() - 0.5) * 6, 0.9, (Math.random() - 0.5) * 6)
  );
};

window.addRandomMeshes = () => {
  clearMeshes();
  const geos = [
    () => new THREE.BoxGeometry(1 + Math.random(), 1 + Math.random(), 1 + Math.random()),
    () => new THREE.SphereGeometry(0.4 + Math.random() * 0.6, 24, 24),
    () => new THREE.CylinderGeometry(0.3, 0.5, 1 + Math.random(), 16),
    () => new THREE.TorusGeometry(0.5, 0.2, 12, 48),
    () => new THREE.ConeGeometry(0.5, 1.5, 16),
  ];
  for (let i = 0; i < 12; i++) {
    const geo = geos[Math.floor(Math.random() * geos.length)]();
    addMesh(
      geo,
      `Mesh_${meshCount}`,
      new THREE.Color().setHSL(i / 12, 0.65, 0.55),
      new THREE.Vector3((Math.random() - 0.5) * 10, 0.75, (Math.random() - 0.5) * 10)
    );
  }
  viewer.fitToView();
};

window.clearMeshes = () => {
  const toRemove = [];
  viewer.scene.traverse(obj => {
    if (obj instanceof THREE.Mesh && obj.userData.id !== 'floor') toRemove.push(obj);
  });
  toRemove.forEach(obj => {
    obj.geometry.dispose();
    (Array.isArray(obj.material) ? obj.material : [obj.material]).forEach(m => m.dispose());
    obj.removeFromParent();
  });
  viewer.clearSelection();
  infoPanel.textContent = 'Scene cleared.';
};

window.fitToView = () => viewer.fitToView();

window.toggleAutoRotate = () => {
  autoRotate = !autoRotate;
  viewer.controls.autoRotate = autoRotate;
  const btn = document.getElementById('btn-autorotate');
  btn.textContent = `Auto Rotate: ${autoRotate ? 'On' : 'Off'}`;
  btn.classList.toggle('active', autoRotate);
};

window.toggleFloor = () => {
  floorVisible = !floorVisible;
  viewer.floor.visible = floorVisible;
  const btn = document.getElementById('btn-floor');
  btn.textContent = `Floor: ${floorVisible ? 'On' : 'Off'}`;
  btn.classList.toggle('active', floorVisible);
};

window.updateSelectionColor = (hex) => {
  viewer.setSelectionColor(hex);
};

// Start with a sample scene
window.addRandomMeshes();
</script>
</body>
</html>
